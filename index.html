<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff4655">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BGMI Tournament 🎮</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--card:#12121a;--card2:#1a1a2e;--acc:#ff4655;--acc2:#ff6b35;--gold:#ffd700;--blue:#00d4ff;--green:#00ff88;--text:#e0e0e0;--dim:#888;--brd:#2a2a3e;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,70,85,.08)0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(0,212,255,.06)0%,transparent 50%);z-index:-1;}

/* ===== AUTH SCREENS ===== */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.auth-logo{font-family:'Orbitron',sans-serif;font-size:2.2em;background:linear-gradient(135deg,#ff4655,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:5px;}
.auth-subtitle{color:var(--dim);text-align:center;margin-bottom:25px;font-size:.9em;}
.auth-card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:24px;width:100%;max-width:400px;}
.auth-card h2{font-family:'Orbitron',sans-serif;font-size:1.1em;color:var(--acc);text-align:center;margin-bottom:16px;}
.auth-tabs{display:flex;gap:4px;margin-bottom:16px;}
.auth-tab{flex:1;padding:10px;text-align:center;border:1px solid var(--brd);background:var(--card2);color:var(--dim);border-radius:8px;font-weight:700;cursor:pointer;transition:all .3s;}
.auth-tab.active{background:var(--acc);color:#fff;border-color:var(--acc);}
.auth-form{display:none;}
.auth-form.active{display:block;}

/* HEADER */
.hdr{text-align:center;padding:14px 12px 8px;border-bottom:2px solid var(--acc);background:linear-gradient(180deg,rgba(255,70,85,.1),transparent);position:relative;}
.hdr h1{font-family:'Orbitron',sans-serif;font-size:1.4em;background:linear-gradient(135deg,#ff4655,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr p{color:var(--dim);font-size:.75em;}
.hdr-btns{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;gap:8px;align-items:center;}
.hdr-btns button{background:none;border:none;color:var(--dim);font-size:1.3em;cursor:pointer;padding:4px;}
.hdr-user{font-size:.75em;color:var(--green);font-weight:700;display:flex;align-items:center;gap:4px;}
.hdr-role{font-size:.6em;padding:2px 6px;border-radius:4px;}
.hdr-role.admin{background:rgba(255,70,85,.2);color:var(--acc);}
.hdr-role.player{background:rgba(0,212,255,.2);color:var(--blue);}

/* NAV */
.nav{display:flex;justify-content:center;gap:4px;padding:8px 6px;flex-wrap:wrap;position:sticky;top:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--brd);}
.nav-btn{padding:7px 12px;border:1px solid var(--brd);background:var(--card);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.8em;font-weight:700;border-radius:8px;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:.5px;}
.nav-btn.active{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border-color:var(--acc);box-shadow:0 0 12px rgba(255,70,85,.3);}

/* PAGES */
.page{display:none;padding:12px;max-width:600px;margin:0 auto;padding-bottom:80px;}
.page.active{display:block;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:12px;}
.card h3{font-family:'Orbitron',sans-serif;font-size:.9em;color:var(--blue);margin-bottom:8px;}

/* FORMS */
.fg{margin-bottom:10px;}
.fg label{display:block;font-weight:700;color:var(--acc);margin-bottom:3px;font-size:.78em;text-transform:uppercase;letter-spacing:1px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--brd);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1em;}
.fg input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 8px rgba(255,70,85,.2);}
.fg select option{background:var(--bg);}

/* BUTTONS */
.btn{padding:9px 20px;border:none;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.78em;font-weight:700;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:1px;display:inline-flex;align-items:center;gap:6px;}
.btn-p{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 0 15px rgba(255,70,85,.3);}
.btn-s{background:var(--card2);color:var(--blue);border:1px solid var(--blue);}
.btn-g{background:rgba(0,255,136,.15);color:var(--green);border:1px solid var(--green);}
.btn-d{background:rgba(255,0,0,.15);color:#ff4444;border:1px solid #ff4444;}
.btn-w{background:rgba(37,211,102,.15);color:#25d366;border:1px solid #25d366;}
.btn-sm{padding:5px 12px;font-size:.7em;}
.btn-grp{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.btn-full{width:100%;justify-content:center;padding:12px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--card2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--brd);}
.stat-v{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-l{font-size:.7em;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.b-up{background:rgba(0,212,255,.2);color:var(--blue);}
.b-live{background:rgba(0,255,136,.2);color:var(--green);animation:pulse 1.5s infinite;}
.b-done{background:rgba(255,215,0,.2);color:var(--gold);}
.b-paid{background:rgba(0,255,136,.2);color:var(--green);}
.b-unpaid{background:rgba(255,70,85,.2);color:var(--acc);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* TAG */
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.68em;font-weight:700;letter-spacing:1px;}

/* TOURNAMENT CARD */
.tc{position:relative;overflow:hidden;}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2),var(--gold));}
.t-meta{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0;font-size:.82em;color:var(--dim);}
.t-meta span{display:flex;align-items:center;gap:3px;}

/* LEADERBOARD */
.lb{display:flex;align-items:center;padding:10px 12px;background:var(--card2);border-radius:8px;margin-bottom:5px;}
.lb-r{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.1em;width:36px;text-align:center;}
.lb-r.r1{color:var(--gold);text-shadow:0 0 8px rgba(255,215,0,.5);}
.lb-r.r2{color:#c0c0c0;}
.lb-r.r3{color:#cd7f32;}
.lb-i{flex:1;margin-left:8px;}
.lb-n{font-weight:700;}
.lb-d{font-size:.75em;color:var(--dim);}
.lb-s{text-align:right;font-family:'Orbitron',sans-serif;}
.lb-p{font-size:1em;font-weight:700;color:var(--gold);}
.lb-k{font-size:.7em;color:var(--acc);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;justify-content:center;align-items:center;padding:12px;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--acc);border-radius:14px;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.modal h2{font-family:'Orbitron',sans-serif;font-size:1.1em;color:var(--acc);margin-bottom:14px;text-align:center;}

/* EMPTY */
.empty{text-align:center;padding:30px 15px;color:var(--dim);}
.empty-i{font-size:2.5em;margin-bottom:8px;}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--acc);color:#fff;padding:10px 20px;border-radius:10px;font-weight:700;z-index:2000;transition:transform .3s;text-align:center;max-width:88%;font-size:.9em;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* PAYMENT */
.pay-card{background:linear-gradient(135deg,#1a1a2e,#0a0a0f);border:2px solid var(--green);border-radius:12px;padding:16px;text-align:center;margin:10px 0;}
.pay-card h4{color:var(--green);font-family:'Orbitron',sans-serif;margin-bottom:8px;}
.upi-id{font-size:1.3em;font-family:'Orbitron',sans-serif;color:var(--gold);letter-spacing:2px;margin:8px 0;}
.pay-amount{font-size:1.8em;font-family:'Orbitron',sans-serif;color:var(--acc);font-weight:900;}

/* BROADCAST */
.broadcast-card{background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(0,255,136,.05));border:1px solid var(--blue);border-radius:10px;padding:14px;margin:8px 0;}
.room-info{font-family:'Orbitron',sans-serif;font-size:1.1em;background:var(--bg);padding:10px;border-radius:8px;margin:8px 0;}
.room-label{font-size:.7em;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
.room-value{color:var(--green);font-size:1.2em;letter-spacing:3px;}

/* BOTTOM NAV */
.btm-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:8px 4px;background:rgba(10,10,15,.98);border-top:1px solid var(--brd);z-index:100;}
.btm-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:.65em;font-weight:700;cursor:pointer;padding:4px 8px;}
.btm-btn.active{color:var(--acc);}
.btm-btn span:first-child{font-size:1.5em;}
@media(min-width:601px){.btm-nav{display:none;}.page{padding-bottom:20px;}}

/* PLAYER DASHBOARD SPECIAL */
.player-welcome{text-align:center;padding:20px;background:linear-gradient(135deg,rgba(255,70,85,.1),rgba(0,212,255,.05));border-radius:12px;margin-bottom:14px;}
.player-welcome h2{font-family:'Orbitron',sans-serif;font-size:1.2em;margin-bottom:4px;}
.player-welcome p{color:var(--dim);font-size:.85em;}
</style>
</head>
<body>

<!-- ==================== AUTH SCREEN ==================== -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-logo">⚔️ BGMI TOURNAMENT</div>
  <div class="auth-subtitle">Organize • Play • Win 🏆</div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showAuthTab('login')">🔑 Login</div>
      <div class="auth-tab" onclick="showAuthTab('signup')">📝 Sign Up</div>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="login-form">
      <div class="fg"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com"></div>
      <div class="fg"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn btn-p btn-full" onclick="doLogin()">🔑 Login</button>
      <div style="text-align:center;margin-top:12px;color:var(--dim);font-size:.8em">
        Admin? <b style="color:var(--acc)">admin@rcb.com / admin123</b> se login karo
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div class="auth-form" id="signup-form">
      <div class="fg"><label>Player Name</label><input type="text" id="signup-name" placeholder="Tera naam"></div>
      <div class="fg"><label>Email</label><input type="email" id="signup-email" placeholder="your@email.com"></div>
      <div class="fg"><label>Phone (WhatsApp)</label><input type="tel" id="signup-phone" placeholder="919876543210"></div>
      <div class="fg"><label>BGMI Name</label><input type="text" id="signup-bgminame" placeholder="In-game name"></div>
      <div class="fg"><label>Password</label><input type="password" id="signup-pass" placeholder="••••••••"></div>
      <button class="btn btn-p btn-full" onclick="doSignup()">📝 Sign Up</button>
    </div>
  </div>
</div>

<!-- ==================== MAIN APP (Hidden initially) ==================== -->
<div id="main-app" style="display:none">

  <!-- HEADER -->
  <div class="hdr">
    <h1>⚔️ BGMI TOURNAMENT</h1>
    <p>Organize • Play • Win 🏆</p>
    <div class="hdr-btns">
      <div class="hdr-user" id="hdr-user"></div>
      <button onclick="doLogout()" title="Logout">🚪</button>
    </div>
  </div>

  <!-- TOP NAV -->
  <div class="nav" id="topnav"></div>

  <!-- BOTTOM NAV -->
  <div class="btm-nav" id="btnav"></div>

  <!-- ===== ADMIN PAGES ===== -->
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-tournaments"></div>
  <div class="page" id="page-teams"></div>
  <div class="page" id="page-matches"></div>
  <div class="page" id="page-leaderboard"></div>

  <!-- ===== PLAYER PAGES ===== -->
  <div class="page" id="page-my-tournaments"></div>
  <div class="page" id="page-my-matches"></div>

</div>

<!-- ==================== MODALS ==================== -->

<!-- Settings -->
<div class="modal-bg" id="modal-settings">
  <div class="modal">
    <h2>⚙️ Settings</h2>
    <div class="fg"><label>Organizer Name</label><input type="text" id="set-name" placeholder="Tournament Organizer"></div>
    <div class="fg"><label>UPI ID</label><input type="text" id="set-upi" placeholder="yourname@upi"></div>
    <div class="fg"><label>UPI Registered Name</label><input type="text" id="set-upiname" placeholder="As per bank"></div>
    <div class="fg"><label>WhatsApp Number</label><input type="text" id="set-whatsapp" placeholder="919876543210"></div>
    <div class="fg"><label>Contact Number</label><input type="text" id="set-contact" placeholder="Contact"></div>
    <div class="btn-grp">
      <button class="btn btn-p" onclick="saveSettings()">💾 Save</button>
      <button class="btn btn-s" onclick="closeModal('settings')">Cancel</button>
    </div>
  </div>
</div>

<!-- Create Tournament (Admin) -->
<div class="modal-bg" id="modal-create-tournament">
  <div class="modal">
    <h2>🏆 Create Tournament</h2>
    <div class="fg"><label>Name</label><input type="text" id="t-name" placeholder="e.g. Friday Showdown"></div>
    <div class="fg"><label>Game Mode</label>
      <select id="t-mode"><option>Squad</option><option>Duo</option><option>Solo</option><option>TPP Squad</option><option>FPP Squad</option></select>
    </div>
    <div class="fg"><label>Map</label>
      <select id="t-map"><option>Erangel</option><option>Miramar</option><option>Sanhok</option><option>Vikendi</option><option>Livik</option></select>
    </div>
    <div class="fg"><label>Max Teams</label><input type="number" id="t-max" value="20" min="2"></div>
    <div class="fg"><label>Entry Fee (₹)</label><input type="number" id="t-fee" value="0" min="0"></div>
    <div class="fg"><label>Prize Pool (₹)</label><input type="number" id="t-prize" value="0" min="0"></div>
    <div class="fg"><label>Date & Time</label><input type="datetime-local" id="t-date"></div>
    <div class="btn-grp">
      <button class="btn btn-p" onclick="createTournament()">Create</button>
      <button class="btn btn-s" onclick="closeModal('create-tournament')">Cancel</button>
    </div>
  </div>
</div>

<!-- Create Team -->
<div class="modal-bg" id="modal-create-team">
  <div class="modal">
    <h2>👥 Add Team</h2>
    <div class="fg"><label>Team Name</label><input type="text" id="tm-name" placeholder="Team Xploit"></div>
    <div class="fg"><label>Tag</label><input type="text" id="tm-tag" placeholder="XPLT" maxlength="6"></div>
    <div class="fg"><label>Captain / IGL</label><input type="text" id="tm-cap" placeholder="In-game name"></div>
    <div class="fg"><label>Player 2</label><input type="text" id="tm-p2" placeholder="In-game name"></div>
    <div class="fg"><label>Player 3</label><input type="text" id="tm-p3" placeholder="In-game name"></div>
    <div class="fg"><label>Player 4</label><input type="text" id="tm-p4" placeholder="In-game name"></div>
    <div class="fg"><label>Phone (WhatsApp)</label><input type="tel" id="tm-phone" placeholder="919876543210"></div>
    <div class="btn-grp">
      <button class="btn btn-p" onclick="createTeam()">Add Team</button>
      <button class="btn btn-s" onclick="closeModal('create-team')">Cancel</button>
    </div>
  </div>
</div>

<!-- Create Match (Admin) -->
<div class="modal-bg" id="modal-create-match">
  <div class="modal">
    <h2>⚔️ Schedule Match</h2>
    <div class="fg"><label>Tournament</label><select id="m-tour"></select></div>
    <div class="fg"><label>Match #</label><input type="number" id="m-num" value="1" min="1"></div>
    <div class="fg"><label>Room ID</label><input type="text" id="m-rid" placeholder="BGMI Room ID"></div>
    <div class="fg"><label>Room Password</label><input type="text" id="m-rpw" placeholder="Room Password"></div>
    <div class="fg"><label>Date & Time</label><input type="datetime-local" id="m-date"></div>
    <div class="btn-grp">
      <button class="btn btn-p" onclick="createMatch()">Schedule</button>
      <button class="btn btn-s" onclick="closeModal('create-match')">Cancel</button>
    </div>
  </div>
</div>

<!-- Enter Results (Admin) -->
<div class="modal-bg" id="modal-results">
  <div class="modal">
    <h2>🏅 Match Results</h2>
    <input type="hidden" id="res-id">
    <div id="res-form"></div>
    <div class="btn-grp">
      <button class="btn btn-p" onclick="saveResults()">💾 Save</button>
      <button class="btn btn-s" onclick="closeModal('results')">Cancel</button>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="modal-bg" id="modal-payment">
  <div class="modal">
    <h2>💳 Entry Fee Payment</h2>
    <div id="pay-content"></div>
    <div class="btn-grp" style="margin-top:12px">
      <button class="btn btn-g btn-sm" onclick="confirmPayment()">✅ Payment Done</button>
      <button class="btn btn-s btn-sm" onclick="closeModal('payment')">Close</button>
    </div>
  </div>
</div>

<!-- Broadcast Room ID (Admin) -->
<div class="modal-bg" id="modal-broadcast">
  <div class="modal">
    <h2>📢 Room ID Broadcast</h2>
    <div id="broadcast-content"></div>
    <div class="btn-grp" style="margin-top:12px">
      <button class="btn btn-w" onclick="broadcastWhatsApp()">📱 WhatsApp</button>
      <button class="btn btn-s" onclick="copyAllRoomIds()">📋 Copy All</button>
      <button class="btn btn-s" onclick="closeModal('broadcast')">Close</button>
    </div>
  </div>
</div>

<!-- Player Join Tournament -->
<div class="modal-bg" id="modal-join-tournament">
  <div class="modal">
    <h2>🎮 Join Tournament</h2>
    <div id="join-content"></div>
    <div class="btn-grp" style="margin-top:12px">
      <button class="btn btn-g btn-sm" id="join-btn" onclick="joinTournament()">✅ Join Now</button>
      <button class="btn btn-s btn-sm" onclick="closeModal('join-tournament')">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== DATA ====================
let D={
  users:[],
  tournaments:[],
  teams:[],
  matches:[],
  activities:[],
  settings:{name:'',upi:'',upiname:'',whatsapp:'',contact:''}
};
let currentUser=null;
let _payTeamId=null,_payTournamentId=null,_bcMatchId=null,_joinTournamentId=null;

function save(){localStorage.setItem('bgmi-v2',JSON.stringify(D));}
function load(){const d=localStorage.getItem('bgmi-v2');if(d){try{D={...D,...JSON.parse(d)};}catch(e){}}}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function addAct(m){D.activities.unshift({m,t:Date.now()});if(D.activities.length>25)D.activities=D.activities.slice(0,25);}

// ==================== AUTH ====================
function showAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
  if(tab==='login'){
    document.querySelectorAll('.auth-tab')[0].classList.add('active');
    document.getElementById('login-form').classList.add('active');
  } else {
    document.querySelectorAll('.auth-tab')[1].classList.add('active');
    document.getElementById('signup-form').classList.add('active');
  }
}

function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){toast('❌ Email aur Password daalo!');return;}

  // Admin login
  if(email==='admin@rcb.com'&&pass==='admin123'){
    currentUser={id:'admin',name:'Admin',email:'admin@rcb.com',role:'admin'};
    localStorage.setItem('bgmi-user',JSON.stringify(currentUser));
    enterApp();
    return;
  }

  // Player login
  const user=D.users.find(u=>u.email===email&&u.pass===pass);
  if(!user){toast('❌ Galat email ya password!');return;}
  currentUser=user;
  localStorage.setItem('bgmi-user',JSON.stringify(currentUser));
  enterApp();
}

function doSignup(){
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const phone=document.getElementById('signup-phone').value.trim();
  const bgminame=document.getElementById('signup-bgminame').value.trim();
  const pass=document.getElementById('signup-pass').value;
  if(!name||!email||!pass){toast('❌ Name, Email aur Password zaruri hai!');return;}

  if(D.users.find(u=>u.email===email)){toast('❌ Email already registered!');return;}

  const user={id:gid(),name,email,phone:bgminame,bgminame,pass,role:'player',created:Date.now()};
  D.users.push(user);
  addAct(`👤 "${name}" ne sign up kiya!`);
  save();
  currentUser=user;
  localStorage.setItem('bgmi-user',JSON.stringify(currentUser));
  enterApp();
}

     <button class="btm-btn" data-page="my-tournaments"><span>🏆</span>Tournaments</button>
     <button class="btm-btn" data-page="my-matches"><span>⚔️</span>Matches</button>
     <button class="btm-btn" data-page="leaderboard"><span>📊</span>Rank</button>`;

  document.getElementById('topnav').innerHTML=navHtml;
  document.getElementById('btnav').innerHTML=btmHtml;

  // Header user info
  const roleClass=currentUser?.role==='admin'?'admin':'player';
  const roleLabel=currentUser?.role==='admin'?'👑 ADMIN':'🎮 PLAYER';
  document.getElementById('hdr-user').innerHTML=`<span class="hdr-role ${roleClass}">${roleLabel}</span> ${currentUser?.name}`;

  // Event listeners
  document.querySelectorAll('[data-page]').forEach(b=>{
    b.addEventListener('click',()=>go(b.dataset.page));
  });

  // Set active page
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-dashboard').classList.add('active');
}

function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  const el=document.getElementById('page-'+page);
  if(el)el.classList.add('active');
  renderAll();
}

let _joinTourId=null;
function openJoinTournament(tid){
  _joinTourId=tid;
  const t=D.tournaments.find(x=>x.id===tid);
  if(!t)return;
  const myTeams=D.teams.filter(tm=>tm.userId===currentUser.id);
  const isRegistered=t.teams.some(tid=>myTeams.find(m=>m.id===tid));
  const isPaid=(t.paid||[]).some(pid=>myTeams.find(m=>m.id===pid));
  const feeText=t.fee>0?`Entry Fee: ₹${t.fee}`:'FREE Entry';

  let h=`
    <div style="text-align:center;margin-bottom:12px">
      <h3 style="color:var(--blue)">${t.name}</h3>
      <span class="badge b-${t.status}">${t.status}</span>
    </div>
    <div class="t-meta" style="justify-content:center">
      <span>🎮 ${t.mode}</span><span>🗺️ ${t.map}</span><span>👥 ${t.teams.length}/${t.max}</span>
    </div>
    <div style="text-align:center;margin:10px 0;font-size:1.1em;color:${t.fee>0?'var(--acc)':'var(--green)'}; font-weight:700">${feeText}</div>
    ${t.prize?`<div style="text-align:center;color:var(--gold);font-weight:700">🏆 Prize: ₹${t.prize}</div>`:''}
    <div style="margin-top:12px">
      <div style="font-weight:700;color:var(--blue);margin-bottom:6px">Teri Teams:</div>
      ${myTeams.length?myTeams.map(tm=>{
        const reg=t.teams.includes(tm.id);
        const paid=(t.paid||[]).includes(tm.id);
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--bg);border-radius:8px;margin-bottom:4px">
          <span><span class="tag" style="background:rgba(0,212,255,.15);color:var(--blue)">${tm.tag}</span> ${tm.name}</span>
          ${reg?`<span class="badge ${paid?'b-paid':'b-unpaid'}">${paid?'✅ Paid':'💰 Pay'}</span>`:'<span style="color:var(--dim);font-size:.8em">Not joined</span>'}
        </div>`;
      }).join(''):'<div style="color:var(--dim);font-size:.85em">Pehle apni team banao!</div>'}
    </div>
  `;
  document.getElementById('join-content').innerHTML=h;
  openModal('join-tournament');
}

function joinTournament(){
  const t=D.tournaments.find(x=>x.id===_joinTourId);
  if(!t)return;
  const myTeams=D.teams.filter(tm=>tm.userId===currentUser.id);
  let joined=false;
  myTeams.forEach(tm=>{
    if(!t.teams.includes(tm.id)){
      t.teams.push(tm.id);
      joined=true;
    }
  });
  if(joined){
    addAct(`🎮 "${currentUser.name}" joined "${t.name}"`);
    save();closeModal('join-tournament');renderAll();toast('✅ Tournament joined!');
  } else {
    toast('⚠️ Already joined ya koi team nahi!');
  }
}

function payTournamentFee(tid,tmid){
  _payTournamentId=tid;_payTeamId=tmid;
  const t=D.tournaments.find(x=>x.id===tid);
  if(!t||!t.fee||!D.settings.upi){toast('❌ UPI ID set nahi hai ya free hai!');return;}
  const upiLink=`upi://pay?pa=${encodeURIComponent(D.settings.upi)}&pn=${encodeURIComponent(D.settings.upiname||D.settings.name)}&am=${t.fee}&cu=INR&tn=${encodeURIComponent('Entry: '+t.name)}`;
  let h=`<div class="pay-card">
    <h4>💳 ENTRY FEE</h4>
    <div style="color:var(--dim);font-size:.85em">${t.name}</div>
    <div class="pay-amount">₹${t.fee}</div>
    <div class="room-label" style="margin-top:8px">Pay to</div>
    <div class="upi-id">${D.settings.upi}</div>
    <div style="color:var(--dim);font-size:.75em">${D.settings.upiname||''}</div>
  </div>
  <div style="text-align:center;margin:10px 0">
    <a href="${upiLink}" style="display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#00b9f5,#7b61ff);color:#fff;text-decoration:none;border-radius:10px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:.9em">💰 Pay ₹${t.fee} via UPI</a>
  </div>`;
  document.getElementById('pay-content').innerHTML=h;
  openModal('payment');
}
function confirmPayment(){
  const t=D.tournaments.find(x=>x.id===_payTournamentId);
  if(!t)return;
  if(!t.paid)t.paid=[];
  if(!t.paid.includes(_payTeamId)){t.paid.push(_payTeamId);addAct(`💰 Payment confirmed: ${_payTeamId}`);}
  save();closeModal('payment');renderAll();toast('✅ Payment confirmed!');
}

function broadcastWhatsApp(){
  const m=D.matches.find(x=>x.id===_bcMatchId);const t=D.tournaments.find(x=>x.id===m?.tid);if(!m||!t)return;
  const msg=`🎮 *${t.name} — Match #${m.num}*\n🔑 *Room ID:* \`${m.rid||'TBA'}\`\n🔒 *Password:* \`${m.rpw||'TBA'}\`\n${m.date?`📅 *Time:* ${fmtDate(m.date)}\n`:''}\n⚡ Jaldi join karo!`;
  const teamsWithPhone=t.teams.map(tid=>D.teams.find(x=>x.id===tid)).filter(tm=>tm?.phone);
  if(teamsWithPhone.length>0){teamsWithPhone.forEach(tm=>{const phone=tm.phone.replace(/[^0-9]/g,'');window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');});toast(`📱 Opening WhatsApp for ${teamsWithPhone.length} teams...`);}
  else{window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');toast('📱 WhatsApp khula!');}
}
function copyAllRoomIds(){
  const m=D.matches.find(x=>x.id===_bcMatchId);const t=D.tournaments.find(x=>x.id===m?.tid);if(!m||!t)return;
  const text=`🎮 ${t.name} — Match #${m.num}\n🔑 Room ID: ${m.rid||'TBA'}\n🔒 Password: ${m.rpw||'TBA'}${m.date?'\n📅 '+fmtDate(m.date):''}`;
  navigator.clipboard.writeText(text).then(()=>toast('📋 Copied!')).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 Copied!');});
}

    ${t.status!=='done'?`<div style="margin:6px 0;display:flex;flex-wrap:wrap;gap:4px">${freeTeams.slice(0,5).map(tm=>`<button class="btn btn-sm btn-s" onclick="regTeam('${t.id}','${tm.id}')">${tm.tag}</button>`).join('')}${freeTeams.length>5?`<span style="color:var(--dim);font-size:.8em;line-height:2">+${freeTeams.length-5}</span>`:''}</div>`:''}
    <div class="btn-grp"><button class="btn btn-sm btn-d" onclick="delTournament('${t.id}')">🗑️</button></div></div>`;
  }).join('');
}

function renderTeamsAdmin(){
  const el=document.getElementById('page-teams');
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-family:Orbitron;color:var(--blue);font-size:1em">👥 Teams</h2><button class="btn btn-p btn-sm" onclick="openModal('create-team')">+ Add</button></div>`+
  (D.teams.length?D.teams.map(t=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><h3 style="color:var(--blue);margin-bottom:2px"><span class="tag" style="background:rgba(0,212,255,.15);color:var(--blue)">${t.tag}</span> ${t.name}</h3><div style="font-size:.78em;color:var(--dim)">IGL: ${t.cap} ${t.phone?'• 📱':''}</div></div><button class="btn btn-sm btn-d" onclick="delTeam('${t.id}')">🗑️</button></div><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">${t.players.map((p,i)=>`<span style="padding:2px 7px;background:var(--bg);border-radius:4px;font-size:.78em">${i===0?'👑':'•'} ${p}</span>`).join('')}</div></div>`).join(''):'<div class="empty"><div class="empty-i">👥</div>No teams yet</div>');
}

function renderMatchesAdmin(){
  const el=document.getElementById('page-matches');
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-family:Orbitron;color:var(--green);font-size:1em">⚔️ Matches</h2><button class="btn btn-p btn-sm" onclick="openModal('create-match')">+ Schedule</button></div>`+
  (D.matches.length?[...D.matches].reverse().map(m=>{const t=D.tournaments.find(x=>x.id===m.tid);return`<div class="card" style="border-left:3px solid var(--acc)"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="font-size:.9em">Match #${m.num} <span class="badge b-${m.status}" style="margin-left:6px">${m.status}</span></h3><span style="font-size:.75em;color:var(--dim)">${t?.name||'?'}</span></div>${m.date?`<div class="t-meta"><span>📅 ${fmtDate(m.date)}</span></div>`:''}${m.rid?`<div style="margin:6px 0;padding:8px;background:var(--bg);border-radius:6px;font-family:Orbitron;font-size:.78em;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px"><span>🔑 <span style="color:var(--green)">${m.rid}</span> 🔒 <span style="color:var(--blue)">${m.rpw||'---'}</span></span><button class="btn btn-sm btn-g" onclick="openBroadcast('${m.id}')">📢 Broadcast</button></div>`:''}<div class="btn-grp"><button class="btn btn-sm btn-s" onclick="toggleMStatus('${m.id}')">🔄</button>${m.status!=='done'?`<button class="btn btn-sm btn-p" onclick="openResults('${m.id}')">🏅 Results</button>`:''}${m.rid?`<button class="btn btn-sm btn-w" onclick="openBroadcast('${m.id}')">📢</button>`:''}<button class="btn btn-sm btn-d" onclick="delMatch('${m.id}')">🗑️</button></div>${m.results?renderMResults(m):''}</div>`;}).join(''):'<div class="empty"><div class="empty-i">⚔️</div>No matches yet</div>');
}

// ----- PLAYER -----
function renderDashPlayer(){
  const el=document.getElementById('page-dashboard');
  const myTeams=D.teams.filter(t=>t.userId===currentUser.id);
  const myTourIds=D.tournaments.filter(t=>t.teams.some(tid=>myTeams.find(m=>m.id===tid))).map(t=>t.id);
  const upcomingMatches=D.matches.filter(m=>myTourIds.includes(m.tid)&&m.status!=='done');

  el.innerHTML=`
    <div class="player-welcome">
      <h2>Welcome, ${currentUser.name}! 🎮</h2>
      <p>BGMI Name: ${currentUser.bgminame||'Not set'}</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-v">${myTeams.length}</div><div class="stat-l">My Teams</div></div>
      <div class="stat"><div class="stat-v">${myTourIds.length}</div><div class="stat-l">Joined</div></div>
      <div class="stat"><div class="stat-v">${upcomingMatches.length}</div><div class="stat-l">Upcoming</div></div>
      <div class="stat"><div class="stat-v">${D.tournaments.filter(t=>t.status==='live').length}</div><div class="stat-l">Live</div></div>
    </div>
    <div class="card">
      <h3>⚡ Quick Actions</h3>
      <div class="btn-grp">
        <button class="btn btn-p btn-sm" onclick="openModal('create-team')">👥 Add Team</button>
        <button class="btn btn-s btn-sm" onclick="go('my-tournaments')">🏆 Browse</button>
      </div>
    </div>
    <div class="card"><h3>📋 My Activity</h3>${D.activities.filter(a=>a.m.includes(currentUser.name)).slice(0,5).map(a=>`<div style="padding:5px 0;border-bottom:1px solid var(--brd);font-size:.85em">${a.m} <span style="color:var(--dim);font-size:.75em;float:right">${tAgo(a.t)}</span></div>`).join('')||'<div style="color:var(--dim);font-size:.85em">Abhi koi activity nahi</div>'}</div>
  `;
}

function renderMyTournaments(){
  const el=document.getElementById('page-my-tournaments');
  const myTeams=D.teams.filter(t=>t.userId===currentUser.id);
  el.innerHTML=`<h2 style="font-family:Orbitron;color:var(--acc);font-size:1em;margin-bottom:12px">🏆 Available Tournaments</h2>`+
  (D.tournaments.filter(t=>t.status!=='done').length?D.tournaments.filter(t=>t.status!=='done').map(t=>{
    const isJoined=t.teams.some(tid=>myTeams.find(m=>m.id===tid));
    return`<div class="card tc"><div style="display:flex;justify-content:space-between;align-items:start"><div><h3 style="margin-bottom:3px">${t.name}</h3><span class="badge b-${t.status}">${t.status}</span></div></div>
    <div class="t-meta"><span>🎮 ${t.mode}</span><span>🗺️ ${t.map}</span><span>👥 ${t.teams.length}/${t.max}</span>${t.fee?`<span>💰 ₹${t.fee}</span>`:''}${t.prize?`<span>🏆 ₹${t.prize}</span>`:''}</div>
    <div class="btn-grp">
      ${isJoined?`<button class="btn btn-sm btn-g" disabled>✅ Joined</button><button class="btn btn-sm btn-s" onclick="openJoinTournament('${t.id}')">📋 Details</button>`:`<button class="btn btn-sm btn-p" onclick="openJoinTournament('${t.id}')">🎮 Join</button>`}
    </div></div>`;
  }).join(''):'<div class="empty"><div class="empty-i">🏆</div>Abhi koi tournament nahi hai</div>');
}

function renderMyMatches(){
  const el=document.getElementById('page-my-matches');
  const myTeams=D.teams.filter(t=>t.userId===currentUser.id);
  const myMatches=D.matches.filter(m=>{
    const t=D.tournaments.find(x=>x.id===m.tid);
    return t&&t.teams.some(tid=>myTeams.find(m=>m.id===tid));
  });
  el.innerHTML=`<h2 style="font-family:Orbitron;color:var(--green);font-size:1em;margin-bottom:12px">⚔️ My Matches</h2>`+
  (myMatches.length?myMatches.reverse().map(m=>{
    const t=D.tournaments.find(x=>x.id===m.tid);
    return`<div class="card" style="border-left:3px solid var(--acc)"><h3 style="font-size:.9em">Match #${m.num} <span class="badge b-${m.status}" style="margin-left:6px">${m.status}</span></h3>
    <div style="font-size:.8em;color:var(--dim)">${t?.name||''}</div>
    ${m.date?`<div class="t-meta"><span>📅 ${fmtDate(m.date)}</span></div>`:''}
    ${m.rid?`<div style="margin:8px 0;padding:10px;background:var(--bg);border-radius:8px;text-align:center"><div class="room-label">🔑 ROOM ID</div><div class="room-info"><span class="room-value">${m.rid}</span></div><div class="room-label">🔒 PASSWORD</div><div class="room-info"><span class="room-value">${m.rpw||'---'}</span></div></div>`:'<div style="color:var(--dim);font-size:.8em;margin-top:4px">Room ID abhi available nahi hai</div>'}
    ${m.results?renderMResults(m):''}</div>`;
  }).join(''):'<div class="empty"><div class="empty-i">⚔️</div>Abhi koi match nahi hai</div>');
}

// ----- SHARED -----
function renderMResults(m){
  const entries=Object.entries(m.results).sort((a,b)=>a[1].pos-b[1].pos);
  let h='<div style="margin-top:8px;border-top:1px solid var(--brd);padding-top:8px">';
  entries.forEach(([tid,r])=>{const tm=D.teams.find(x=>x.id===tid);const pts=calcPts(r.pos,r.kills);const pc=r.pos<=3?`color:${r.pos===1?'var(--gold)':r.pos===2?'#c0c0c0':'#cd7f32'}`:'color:var(--dim)';h+=`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.82em"><span style="font-family:Orbitron;font-weight:900;width:28px;${pc}">#${r.pos}</span><span style="font-weight:700;flex:1">${tm?.tag||'???'} ${tm?.name||'?'}</span><span style="color:var(--acc)">${r.kills}k</span><span style="font-family:Orbitron;color:var(--gold);font-weight:700">${pts}p</span></div>`;});
  return h+'</div>';
}

function renderLeaderboard(){
  const el=document.getElementById('page-leaderboard');
  const st={};D.teams.forEach(t=>{st[t.id]={team:t,pts:0,kills:0,matches:0,pl:[]};});
  D.matches.filter(m=>m.results).forEach(m=>{Object.entries(m.results).forEach(([tid,r])=>{if(!st[tid])return;const pts=calcPts(r.pos,r.kills);st[tid].pts+=pts;st[tid].kills+=r.kills;st[tid].matches++;st[tid].pl.push(r.pos);});});
  const sorted=Object.values(st).sort((a,b)=>b.pts-a.pts||b.kills-a.kills);
  const el2=document.getElementById('page-leaderboard');
  el2.innerHTML=`<h2 style="font-family:Orbitron;color:var(--gold);margin-bottom:12px;font-size:1em">📊 Leaderboard</h2>`+(sorted.length?sorted.map((s,i)=>{const avg=s.matches?(s.pl.reduce((a,b)=>a+b,0)/s.matches).toFixed(1):'-';return`<div class="lb"><div class="lb-r ${i===0?'r1':i===1?'r2':i===2?'r3':''}">#${i+1}</div><div class="lb-i"><div class="lb-n"><span class="tag" style="background:rgba(0,212,255,.15);color:var(--blue)">${s.team.tag}</span> ${s.team.name}</div><div class="lb-d">${s.matches} matches • ${s.kills} kills • Avg #${avg}</div></div><div class="lb-s"><div class="lb-p">${s.pts}</div><div class="lb-k">PTS</div></div></div>`;}).join(''):'<div class="empty"><div class="empty-i">📊</div>Add matches & results</div>');
}

// ==================== UTILS ====================
function fmtDate(d){if(!d)return'';return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
function tAgo(ts){const d=Date.now()-ts;if(d<60000)return'abhi';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago';}

// ==================== INIT ====================
load();
const savedUser=localStorage.getItem('bgmi-user');
if(savedUser){try{currentUser=JSON.parse(savedUser);enterApp();}catch(e){}}
</script>
